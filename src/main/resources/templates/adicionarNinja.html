<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Adicionar Ninja</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f7fb;
            padding:40px;
        }

        .container{

            background:white;
            max-width:450px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.08);

        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:10px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:6px;
            border:1px solid #ddd;
        }

        button{

            margin-top:20px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#16a34a;
            color:white;
            font-weight:bold;
            cursor:pointer;

        }

        button:hover{
            background:#15803d;
        }

        .voltar{

            display:block;
            margin-top:15px;
            text-align:center;
            text-decoration:none;
            color:#2563eb;

        }

    </style>

</head>

<body>

<h1>Novo Ninja</h1>

<div class="container">

    <form th:action="@{/ninjas/ui/salvar}"
          th:object="${ninja}"
          method="post">

        <label>Nome</label>
        <input type="text" th:field="*{nome}" required>

        <label>Email</label>
        <input type="email" th:field="*{email}" required>

        <label>Imagem</label>
        <input type="text" th:field="*{imgUrl}" required>

        <label>Idade</label>
        <input type="number" th:field="*{idade}" required>

        <label>Rank</label>
        <input type="text" th:field="*{rank}">

        <button type="submit">
            Cadastrar Ninja
        </button>

    </form>

    <a class="voltar"
       th:href="@{/ninjas/ui/listar}">
        Voltar para lista
    </a>

</div>

</body>
</html>
